# App Development Archetype
# Use for: web apps, mobile apps, desktop apps, SaaS products

name: app-development
description: Full-stack or frontend/backend application development

# Agent roster for this archetype
agents:
  core:  # Always included
    - orchestrator
    - tester
    - reviewer
    - scrutinizer
    - auditor

  domain:  # Select based on project specifics
    # If frontend-heavy or frontend-only:
    - frontend-engineer
    # If backend-heavy or backend-only:
    - backend-engineer
    # If both frontend + backend:
    # Include both, OR use a single code-engineer if tightly coupled
    # If needs architectural work:
    - architect

# Typical file boundaries
boundaries:
  frontend-engineer:
    modifies:
      - "app/(pages)/"
      - "components/"
      - "styles/"
      - "public/"
    reads_only:
      - "lib/"
      - "app/api/"
  backend-engineer:
    modifies:
      - "app/api/"
      - "lib/"
      - "prisma/"
      - "server/"
    reads_only:
      - "components/"
      - "app/(pages)/"
  architect:
    modifies:
      - "docs/"
      - "eval/results/"
    reads_only:
      - everything

# Quality rubric dimensions for this archetype
quality_dimensions:
  - UI consistency and responsiveness
  - Code quality and type safety
  - Performance (load times, bundle size, rendering)
  - Error handling and edge cases
  - Accessibility (a11y)
  - User experience flow
  - Test coverage
  - Security (auth, input validation, XSS prevention)

# Recommended Claude Code plugins
plugins:
  - name: frontend-design
    install: "/plugin install frontend-design@claude-plugins-official"
    purpose: "Pushes Claude toward distinctive, polished UI code instead of generic AI aesthetics. Handles typography, color palettes, animations, spatial composition. Install this for any UI improvement work."
    note: "Opinionated toward bold design. If the project needs conservative/enterprise styling, may need to be tempered."

# Testing methodology
testing:
  primary: "Automated test suite (unit + integration + e2e)"
  secondary: "Manual QA checklist for visual/UX changes"
  visual_testing:
    description: "Before/after screenshot comparison for UI changes"
    flow:
      - "Tester captures screenshots of affected pages BEFORE the change (using Playwright plugin)"
      - "Frontend-engineer makes the change"
      - "Tester captures screenshots of the same pages AFTER the change"
      - "Tester/reviewer reads both screenshots and compares visually"
      - "Reports specific visual issues: spacing, alignment, color mismatches, broken layouts"
    note: "Claude can read images natively. This gives agents 'eyes' for UI work — the biggest limitation without it is that agents can write CSS but can't see the result."
    requires: "playwright plugin installed"
  tools:
    - "Framework test runner (jest, vitest, etc.)"
    - "E2E testing (playwright, cypress, etc.)"
    - "Playwright screenshots for visual before/after comparison"
    - "Lighthouse/PageSpeed for performance"
    - "Browser dev tools for visual inspection"

# Session patterns
session_patterns:
  quick_fix: "Fix specific bug → test → review → commit"
  feature: "Design → implement → test → review → commit"
  refactor: "Architect proposes → engineer implements → test → review"
  ui_polish: "Screenshot current state → implement improvements → compare before/after → review"
  exploration: "Scrutinizer analyses codebase → presents findings → user decides direction"
